  /v1/pools:
    get:
      summary: Get pools information
      description: |
        Retrieves comprehensive information about supported DeFi protocols, pools, Total Value Locked (TVL), and Annual Percentage Yield (APY) data on supported networks.<br><br>

        The response is a flat list of pools across supported protocols (Aave, Morpho, Euler) and tokens (USDC, MUSD, USDT, RLUSD). Each pool includes protocol metadata, pool address/name, underlying token details, TVL, liquidity, collateral exposure, APY breakdowns, signing metadata, and blacklist status.<br><br>

        **APY Information**: The APY data includes native lending rates, reward provider APYs (e.g., MERKLE, BREVIS), and total combined APY. All APY values are formatted to 2 decimal places and represent 7-day average market rates adjusted by fees.<br><br>

        **Aave pool address collision example**: On Ethereum, the following pools 
        all share `poolAddress: "0x87870Bca3F3fD6335C3F4ce8392D69350B4fA4E2"`:
        - Aave V3 USDC (underlyingToken.symbol: "USDC")
        - Aave V3 USDT (underlyingToken.symbol: "USDT")  
        - Aave V3 RLUSD (underlyingToken.symbol: "RLUSD")
        - Aave V3 MUSD (underlyingToken.symbol: "MUSD")
        
        When rendering a token-specific pool list, filter by `underlyingToken.symbol`, 
        not by `poolAddress`.

        This endpoint requires an API key and can be used to discover available investment opportunities before configuring a rebalancer or making deposits.
      operationId: getPools
      tags:
        - Pools
      responses:
        "200":
          description: Pools information retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPoolsResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedNoHeader"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/balances/{walletAddress}:
    get:
      summary: Get rebalancer balances
      description: |
        Retrieves detailed balance information across all protocols and pools for a wallet address. This endpoint provides comprehensive financial data including token balances, net earnings, aggregate APY, and per-protocol/per-pool breakdowns.<br><br>

        **Authentication**: Requires a valid API key. The wallet address must be a valid checksummed EOA address.<br><br>

        **Token Filtering**: The optional `tokens` query parameter accepts a comma-separated list of token symbols (e.g., `USDC,MUSD,USDT`). If not provided, balances for all supported tokens are returned.<br><br>

        **Balance Details**: For each token, the response includes:
        - Total balance across all chains (raw units and human-readable format)
        - Net earnings in USD (calculated as current balance minus net deposits/withdrawals)
        - Aggregate APY (weighted average across all protocols)
        - Per-chain breakdown with per-protocol and per-pool details<br><br>

        **Spending / Card Balance (USDC only)**: For users with the MetaLend card 
          feature active in their configuration, the total rebalancer balance consists 
          of **two parts**:

        - **Regular rebalancing balance** — funds held across DeFi pools on all chains, 
          shown in `perToken[n].perChain[m].perProtocol[p].perPool[q]`.
        - **Card balance** — funds reserved on Linea for card spending, shown in 
          `perToken[n].spendingInfo`. This is USDC only and has two sub-components:
          - Liquid USDC held in the rebalancer contract on Linea (`lineaUsdcBalance`)
          - USDC deposited in Aave V3 on Linea, earning yield while available for 
            card spending (`lineaAaveUsdcBalance`)

        `spendingInfo` is `null` when the card feature is not active for the user. 
          When displaying total balance to the user, include both the pool balances 
          AND `spendingInfo` amounts — they are additive parts of the same rebalancer.

        **Withdraw Request**: Each pool balance includes optional `withdrawRequest` containing EIP-712 domain parameters, type definitions, and value structure for creating withdrawal signatures. The `value` field includes `token` and `poolContract` addresses, while `amount` and `deadline` must be supplied by the user when creating a withdrawal via `/v1/withdrawals` endpoint.<br><br>

        **Summary**: The response includes an aggregate summary with total balance across all queried tokens, total net earnings, queried tokens, and queried chains.<br><br>

        **Error Handling**: If blockchain queries fail or the wallet has no rebalancer configuration, appropriate error responses are returned. The endpoint uses an all-or-nothing approach - if any token query fails, the entire request fails with a 500 or 503 status code.
      operationId: getRebalancerBalances
      tags:
        - Balances
      parameters:
        - name: walletAddress
          in: path
          required: true
          description: User's Ethereum wallet address
          schema:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
          example: "0x1234567890123456789012345678901234567890"
        - name: tokens
          in: query
          required: false
          description: Comma-separated list of token symbols to query
          schema:
            type: string
          example: "USDC,MUSD,USDT"
      responses:
        "200":
          description: Rebalancer balances retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBalancesResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                walletAddressBlank:
                  $ref: "#/components/examples/WalletAddressBlank"
                invalidAddressFormat:
                  $ref: "#/components/examples/InvalidAddressFormat"
                invalidAddressCheckSum:
                  $ref: "#/components/examples/InvalidAddressCheckSum"
                tokenNotSupported:
                  $ref: "#/components/examples/TokenNotSupported"
        "401":
          $ref: "#/components/responses/UnauthorizedNoHeader"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "500":
          description: Internal error or query failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                failedBalances:
                  $ref: "#/components/examples/FailedBalances"
                userDoesNotExist:
                  $ref: "#/components/examples/UserDoesNotExist"
                rebalancerDoesNotExistForWallet:
                  $ref: "#/components/examples/RebalancerDoesNotExistForWallet"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
 
  /v1/rewards/{walletAddress}:
    get:
      summary: Get rewards
      description: |
        Retrieves aggregated rewards data for the specified wallet address across 
        supported reward sources (currently Merkle-based rewards).

        **How to claim rewards — the `claimTransaction` is pre-built, just send it.**

        Each `RewardItem` with claimable rewards includes a non-null `claimTransaction` 
        field. The backend has already constructed the full ABI-encoded calldata for the 
        `claimRewards(address,address[],uint256[],bytes32[][])` function — including the 
        distributor address, token addresses, amounts, and merkle proofs.

        To execute the claim, send a transaction from the user's wallet with exactly 
        these values:
        - `to`: `claimTransaction.to` — the rewards distributor contract address
        - `data`: `claimTransaction.calldata` — fully encoded, ready to submit as-is
        - `chainId`: `claimTransaction.chainId` — the chain to send it on

        **You do NOT need to encode anything yourself.** Do not use `params`, `abi`, or 
        `method` to construct the calldata — those are informational only. Use `calldata` 
        directly as the transaction `data` field.

        Example (viem):
        await walletClient.sendTransaction({
          to: claimTransaction.to,
          data: claimTransaction.calldata,
          chainId: claimTransaction.chainId,
        })
      operationId: getRewards
      tags:
        - Rewards
      parameters:
        - name: walletAddress
          in: path
          required: true
          description: User's Ethereum wallet address
          schema:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
          example: "0x1234567890123456789012345678901234567890"
      responses:
        "200":
          description: Rewards retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRewardsResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                walletAddressBlank:
                  $ref: "#/components/examples/WalletAddressBlank"
                invalidAddressFormat:
                  $ref: "#/components/examples/InvalidAddressFormat"
                invalidAddressCheckSum:
                  $ref: "#/components/examples/InvalidAddressCheckSum"
        "401":
          $ref: "#/components/responses/UnauthorizedNoHeader"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                userDoesNotExist:
                  $ref: "#/components/examples/UserDoesNotExist"
                rebalancerDoesNotExistForWallet:
                  $ref: "#/components/examples/RebalancerDoesNotExistForWallet"
 
