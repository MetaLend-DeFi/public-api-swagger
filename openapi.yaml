      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "SIGNATURE_REQUIRED"
        message: "Failed to validate config signature"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    InvalidPoolIdentifier:
      summary: Invalid pool identifier
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "INVALID_POOL"
        message: "Protocol ID '5' at position 0 is not supported. Supported protocol IDs: 0 (Aave), 1 (Morpho), 2 (Euler)"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

