          description: Total balance across all tokens (formatted to 2 decimals)
          example: "5000.00"
        totalNetEarnings:
          type: string
          description: Total net earnings in USD (formatted to 2 decimals)
          example: "45.67"
        queriedTokens:
          type: array
          items:
            type: string
          description: List of queried token symbols
          example: ["USDC", "MUSD", "USDT"]
        queriedChains:
          type: array
          items:
            type: string
          description: List of queried chain names
          example: ["linea"]

    TokenBalance:
      type: object
      required:
        - token
        - totalBalanceRaw
        - totalBalanceFormatted
        - netEarning
        - aggregateApy
        - perChain
      properties:
        token:
          type: string
          description: Token symbol
          example: "USDC"
        totalBalanceRaw:
          type: string
          description: Total balance in raw units
          example: "1000000000"
        totalBalanceFormatted:
          type: string
          description: Human-readable balance (formatted to 2 decimals)
          example: "1000.00"
        netEarning:
          type: string
          description: Net earnings in USD (formatted to 2 decimals)
          example: "12.34"
        aggregateApy:
          type: string
          description: Weighted average APY across all protocols (formatted to 2 decimals)
          example: "4.56"
        perChain:
          type: array
          items:
            $ref: "#/components/schemas/ChainBalance"
        spendingInfo:
          $ref: "#/components/schemas/SpendingInfo"
        bridgeBalances:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/BridgeBalance"

    ChainBalance:
      type: object
      required:
        - chain
        - chainId
        - totalBalanceRaw
        - totalBalanceFormatted
        - perProtocol
      properties:
        chain:
          type: string
          description: Chain name
          example: "linea"
        chainId:
          type: integer
          description: Chain ID
          example: 59144
        totalBalanceRaw:
          type: string
          description: Total balance in raw units
        totalBalanceFormatted:
          type: string
          description: Total balance formatted
        perProtocol:
          type: array
          items:
            $ref: "#/components/schemas/ProtocolBalance"

    ProtocolBalance:
      type: object
      required:
        - protocolName
        - protocolIconUrl
        - totalBalanceRaw
        - totalBalanceFormatted
        - perPool
      properties:
        protocolName:
          type: string
          description: Protocol name
        protocolIconUrl:
          type: string
          description: Protocol icon URL
        totalBalanceRaw:
          type: string
          description: Total balance in protocol (raw units)
        totalBalanceFormatted:
          type: string
          description: Human-readable balance in protocol (formatted to 2 decimals)
          example: "28.05"
        perPool:
          type: array
          items:
            $ref: "#/components/schemas/PoolBalance"

    PoolBalance:
      type: object
      required:
        - poolAddress
        - poolName
        - balanceRaw
        - balanceFormatted
        - apy
        - chain
        - chainId
      properties:
        poolAddress:
          type: string
          description: Pool contract address
          example: "0xabcdefabcdefabcdefabcdefabcdefabcdefabcd"
        poolName:
          type: string
          description: Pool name
        balanceRaw:
          type: string
          description: Balance in pool (raw units)
        balanceFormatted:
          type: string
          description: Human-readable pool balance (formatted to 2 decimals)
          example: "11.23"
        apy:
          type: string
          description: Current APY for this pool (formatted to 2 decimals)
          example: "4.56"
        chain:
          type: string
          description: Chain name
        chainId:
          type: integer
          description: Chain ID
        withdrawRequest:
          $ref: "#/components/schemas/WithdrawalRequestData"

    SpendingInfo:
      type: object
      required:
        - lineaUsdcBalanceRaw
        - lineaUsdcBalanceFormatted
        - lineaAaveUsdcBalanceRaw
        - lineaAaveUsdcBalanceFormatted
        - lineaAaveApy
      properties:
        lineaUsdcBalanceRaw:
          type: string
        lineaUsdcBalanceFormatted:
          type: string
        lineaAaveUsdcBalanceRaw:
          type: string
        lineaAaveUsdcBalanceFormatted:
          type: string
        lineaAaveApy:
          type: string

    WithdrawalRequestData:
      type: object
      required:
        - domain
        - types
        - value
      properties:
        domain:
          $ref: "#/components/schemas/Domain"
        types:
          $ref: "#/components/schemas/Types"
        value:
          $ref: "#/components/schemas/Value"

    Domain:
      type: object
      required:
        - name
        - version
        - chainId
        - verifyingContract
      properties:
        name:
          type: string
          example: "MetaLend Rebalancing"
        version:
          type: string
          example: "4.0.0"
        chainId:
          type: integer
          example: 59144
        verifyingContract:
          type: string
          description: Contract address

    Types:
      type: object
      required:
        - Withdrawal
      properties:
        Withdrawal:
          type: array
          items:
            $ref: "#/components/schemas/TypeDetail"

    TypeDetail:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          description: Field name
          example: "token"
        type:
          type: string
          description: Field type
          example: "address"

    Value:
      type: object
      required:
        - token
        - poolContract
      properties:
        token:
          type: string
          description: Token address
        poolContract:
          type: string
          description: Pool contract address
        amount:
          type: string
          nullable: true
          description: Withdrawal amount
        deadline:
          type: string
          nullable: true
          description: Withdrawal deadline (Unix epoch timestamp)
          example: "1763558621"

    GetBridgeBalancesResponse:
      type: object
      required:
        - walletAddress
        - rebalancerAddress
        - token
        - balances
      properties:
        walletAddress:
          type: string
          description: Wallet address
        rebalancerAddress:
          type: string
          description: Rebalancer contract address
        token:
          type: string
          description: Token symbol
        balances:
          type: array
          items:
            $ref: "#/components/schemas/BridgeBalance"

    BridgeBalance:
      type: object
      required:
        - destinationPool
        - balanceRaw
        - balanceFormatted
        - estimatedCompletion
        - isForSpending
      properties:
        sourcePool:
          $ref: "#/components/schemas/Pool"
          nullable: true
        destinationPool:
          $ref: "#/components/schemas/Pool"
        balanceRaw:
          type: string
          description: Balance in raw units
        balanceFormatted:
          type: string
          description: Balance formatted
        estimatedCompletion:
          type: string
          description: Estimated completion timestamp or duration
        isForSpending:
          type: boolean
          description: Whether the balance is reserved for spending

    GetRewardsResponse:
      type: object
      required:
        - walletAddress
        - timestamp
        - totalClaimedUsd
        - totalPendingUsd
        - rewards
      properties:
        walletAddress:
          type: string
          description: Wallet address
        timestamp:
          type: string
          description: ISO timestamp
        totalClaimedUsd:
          type: string
          description: Total claimed rewards in USD
        totalPendingUsd:
          type: string
          description: Total pending rewards in USD
        rewards:
          type: array
          items:
            $ref: "#/components/schemas/RewardSource"

    RewardSource:
      type: object
      required:
        - source
        - rewardItems
      properties:
        source:
          type: string
          description: Reward source name
        rewardItems:
          type: array
          items:
            $ref: "#/components/schemas/RewardItem"

    RewardItem:
      type: object
      required:
        - token
        - chain
        - claimedRaw
        - claimedFormatted
        - claimedUsd
        - pendingRaw
        - pendingFormatted
        - pendingUsd
        - distributorAddress
      properties:
        token:
          $ref: "#/components/schemas/Token"
        chain:
          $ref: "#/components/schemas/RewardChainInfo"
        claimedRaw:
          type: string
        claimedFormatted:
          type: string
        claimedUsd:
          type: string
        pendingRaw:
          type: string
        pendingFormatted:
          type: string
        pendingUsd:
          type: string
        distributorAddress:
          type: string
        proof:
          type: array
          nullable: true
          items:
            type: string
        vestingInfo:
          $ref: "#/components/schemas/VestingInfo"
          nullable: true
        claimTransaction:
          $ref: "#/components/schemas/ClaimTransaction"
          nullable: true

    RewardChainInfo:
      type: object
      required:
        - id
        - name
        - icon
        - endOfDisputePeriod
        - explorers
      properties:
        id:
          type: integer
        name:
          type: string
        icon:
          type: string
        endOfDisputePeriod:
          type: integer
        explorers:
          type: array
          items:
            $ref: "#/components/schemas/ChainExplorer"

    ChainExplorer:
      type: object
      required:
        - chainId
        - id
        - type
        - url
      properties:
        chainId:
          type: integer
        id:
          type: string
        type:
          type: string
        url:
          type: string

    ClaimTransaction:
      type: object
      required:
        - to
        - chainId
        - chain
        - method
        - params
        - abi
        - calldata
      properties:
        to:
          type: string
        chainId:
          type: integer
        chain:
          type: string
        method:
          type: string
        params:
          $ref: "#/components/schemas/ClaimTransactionParams"
        abi:
          type: string
        calldata:
          type: string

    ClaimTransactionParams:
      type: object
      required:
        - distributor
        - tokens
        - amounts
        - proofs
      properties:
        distributor:
          type: string
        tokens:
          type: array
          items:
            type: string
        amounts:
          type: array
          items:
            type: string
        proofs:
          type: array
          items:
            type: array
            items:
              type: string

    VestingInfo:
      type: object
      required:
        - totalAllocatedRaw
        - totalAllocatedFormatted
        - unlockedRaw
        - unlockedFormatted
        - lockedRaw
        - lockedFormatted
        - vestingStartTime
        - vestingEndTime
        - vestingDuration
        - vestingGranularity
        - initialUnlockBps
        - bpsDenominator
        - progressPercentage
        - daysElapsed
        - daysTotal
        - stepsCompleted
        - stepsTotal
      properties:
        totalAllocatedRaw:
          type: string
        totalAllocatedFormatted:
          type: string
        unlockedRaw:
          type: string
        unlockedFormatted:
          type: string
        lockedRaw:
          type: string
        lockedFormatted:
          type: string
        vestingStartTime:
          type: integer
        vestingEndTime:
          type: integer
        vestingDuration:
          type: integer
        vestingGranularity:
          type: integer
        initialUnlockBps:
          type: integer
        bpsDenominator:
          type: integer
        progressPercentage:
          type: string
        daysElapsed:
          type: integer
        daysTotal:
          type: integer
        stepsCompleted:
          type: integer
        stepsTotal:
          type: integer

    PrimaryUserByWalletAddressChallengeBody:
      type: object
      required:
        - address
      properties:
        address:
          type: string
          description: Wallet address

    CompleteChallengeWithSignatureBodyV2:
      type: object
      required:
        - walletAddress
        - signature
      properties:
        walletAddress:
          type: string
          description: Wallet address
        signature:
          type: string
          description: Signed challenge message
        extraAddress:
          type: string
          nullable: true
          description: Optional extra address
        chainKind:
          type: string
          nullable: true
          description: Chain kind identifier

    GetChallengeResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Challenge message to sign

    VerifyChallengeResponse:
      type: object
      required:
        - jwt
      properties:
        jwt:
          type: string
          description: Issued JWT for authenticated requests

    ApiError:
      type: object
      required:
        - code
        - internalCode
        - message
      properties:
        code:
          type: string
          description: Error category identifier
        internalCode:
          type: string
          description: More specific error identifier
        message:
          type: string
          description: Human-readable error message
        requestId:
          type: string
          format: uuid
          description: Unique request identifier for tracking
        retryAfterSeconds:
          type: integer
          description: Seconds to wait before retrying (for rate limiting)

  examples:
    UnauthorizedNoHeader:
      summary: No authorization header
      value:
        code: "UNAUTHORIZED"
        internalCode: "NO_AUTH_PROVIDED"
        message: "No valid authorization header provided"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    UnauthorizedInvalidSignature:
      summary: Invalid signature
      value:
        code: "UNAUTHORIZED"
        internalCode: "UNAUTHORIZED"
        message: "Invalid signature: signer does not match user address"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    InvalidAmountGreaterThanZero:
      summary: Invalid amount greater than zero
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "INVALID_AMOUNT"
        message: "Amount must be greater than zero"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    InvalidAmountMinimumGas:
      summary: Invalid amount minimum gas
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "INVALID_AMOUNT"
        message: "Amount must be at least 0.2 to cover gas fees"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    InvalidAmountFormat:
      summary: Invalid amount format
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "INVALID_AMOUNT"
        message: "Amount must be a valid number"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    SignatureNotAllowed:
      summary: Signature not allowed
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "SIGNATURE_NOT_ALLOWED"
        message: "Signature-based approval is not supported for USDT"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    InvalidTimestampBeforeGreaterThanAfter:
      summary: Invalid timestamp before greater than after
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "INVALID_TIMESTAMPS"
        message: "validBefore must be greater than validAfter"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    InvalidTimestampAfterMustBeInPastOrNow:
      summary: Invalid timestamp after must be in past or now
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "INVALID_TIMESTAMPS"
        message: "validAfter must be in the past or now"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    InvalidTimestampBeforeMustBeInFuture:
      summary: Invalid timestamp before must be future
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "INVALID_TIMESTAMPS"
        message: "validBefore must be in the future"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    InvalidTimestampBeforeMustBeAtMostOneMinuteInFuture:
      summary: Invalid timestamp before too far
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "INVALID_TIMESTAMPS"
        message: "validBefore must be at most 1 minute in the future"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    TimestampsRequired:
      summary: Timestamp required
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "TIMESTAMPS_REQUIRED"
        message: "validAfter and validBefore are required when using signature-based approval"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    TimestampsNotAllowed:
      summary: Timestamps not allowed
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "TIMESTAMPS_NOT_ALLOWED"
        message: "Timestamps should not be provided when signature is not use"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    NonceRequired:
      summary: Nonce required
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "NONCE_REQUIRED"
        message: "Nonce is required when using signature-based approval"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    NonceNotAllowed:
      summary: Nonce not allowed
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "NONCE_NOT_ALLOWED"
        message: "Nonce should not be provided when signature is not used"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    TokenNameVersionRequired:
      summary: Token name and version required
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "TOKEN_NAME_AND_VERSION_REQUIRED"
        message: "tokenName and tokenVersion are required when using signature-based approval"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    TokenNameVersionNotAllowed:
      summary: Token name and version not allowed
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "TOKEN_NAME_AND_VERSION_NOT_ALLOWED"
        message: "tokenName and tokenVersion should not be provided when signature is not used"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    DeadlineNotUnix:
      summary: Deadline not UNIX
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "INVALID_DEADLINE"
        message: "Deadline must be a valid Unix timestamp"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    DeadlineMustBeInFuture:
      summary: Deadline must be in future
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "INVALID_DEADLINE"
        message: "Deadline must be in the future"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    DeadlineMaxOneMinuteInFuture:
      summary: Deadline too far in future
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "INVALID_DEADLINE"
        message: "Deadline must be at most 1 minute in the future"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    InvalidTrackingId:
      summary: Invalid tracking ID
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "INVALID_TRACKING_ID"
        message: "Invalid tracking ID format. Expected valid signature or UUID"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    MissingTrackingId:
      summary: Missing tracking ID
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "INVALID_TRACKING_ID"
        message: "Tracking ID cannot be blank"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    TrackingIdNotFound:
      summary: Tracking ID not found
      value:
        code: "NOT_FOUND"
        internalCode: "TRACKING_ID_NOT_FOUND"
        message: "Tracking ID not found or expired"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    WalletAddressBlank:
      summary: Wallet address blank
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "INVALID_WALLET_ADDRESS"
        message: "Wallet address cannot be blank"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    InvalidAddressFormat:
      summary: Invalid address format
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "INVALID_ADDRESS"
        message: "Invalid address format. Expected: 0x followed by 40 hexadecimal characters"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    InvalidAddressCheckSum:
      summary: Invalid address checksum
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "INVALID_ADDRESS"
        message: "Invalid Ethereum address checksum. Please ensure the address is properly checksummed (EIP-55)"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    TokenNotSupported:
      summary: Token not supported
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "INVALID_TOKEN"
        message: "Token RLUSD is not supported. Supported tokens: USDC, MUSD, USDT"
        requestId: "2c2f3dc1-d19a-49cb-b695-37d025e551b3"
        retryAfterSeconds: null

    ConfigArraysMismatchCount:
      summary: Config arrays mismatch count
      value:
        code: "ILLEGAL_ARGUMENT"
        internalCode: "MISMATCHED_ARRAY_LENGTHS"
        message: "Configuration arrays length mismatch: chains(2), protocols(2), pools(1)."
